services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: challenge_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  web:
    build: .
    command: >
      sh -c "until python -c \"import psycopg2; psycopg2.connect(host='db', dbname='challenge_db', user='postgres', password='postgres')\" 2>/dev/null; do echo waiting for db...; sleep 2; done &&
           python manage.py migrate &&
           python manage.py runserver 0.0.0.0:8010"
    volumes:
      - .:/app
      - shared_tmp:/tmp/imports
    ports:
      - "8010:8010"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: >
      sh -c "until python -c \"import psycopg2; psycopg2.connect(host='db', dbname='challenge_db', user='postgres', password='postgres')\" 2>/dev/null; do sleep 2; done &&
            celery -A config worker --loglevel=info"
    volumes:
      - .:/app
      - shared_tmp:/tmp/imports
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  shared_tmp: